<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>Spent</title>
<!-- No external fonts - fully self-contained -->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0a0a0a;
    --surface: #151515;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --text2: #888;
    --accent: #c8ff00;
    --accent-dim: #3a4a00;
    --red: #ff4444;
    --green: #44cc66;
    --radius: 16px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100%;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── Header ── */
  .header {
    padding: 16px 20px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  .logo {
    font-family: ui-monospace, 'Cascadia Code', 'Menlo', 'Consolas', monospace;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -1px;
    color: var(--accent);
  }

  .month-nav {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .month-nav button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text2);
    width: 32px;
    height: 32px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .month-label {
    font-family: ui-monospace, 'Cascadia Code', 'Menlo', 'Consolas', monospace;
    font-size: 13px;
    color: var(--text2);
    min-width: 90px;
    text-align: center;
  }

  /* ── Summary ── */
  .summary {
    padding: 4px 20px 12px;
    flex-shrink: 0;
  }

  /* ── Entry list ── */
  .list-container {
    flex: 1;
    overflow-y: auto;
    padding: 0 20px;
    -webkit-overflow-scrolling: touch;
  }

  .day-group {
    margin-bottom: 20px;
  }

  .day-header {
    font-family: ui-monospace, 'Cascadia Code', 'Menlo', 'Consolas', monospace;
    font-size: 11px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
  }

  .entry {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 14px;
    background: var(--surface);
    border-radius: 12px;
    margin-bottom: 6px;
    position: relative;
    transition: transform 0.15s, opacity 0.15s;
  }

  .entry:active {
    transform: scale(0.98);
  }

  .entry-left {
    flex: 1;
    min-width: 0;
  }

  .entry-comment {
    font-size: 15px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .entry-time {
    font-family: ui-monospace, 'Cascadia Code', 'Menlo', 'Consolas', monospace;
    font-size: 11px;
    color: var(--text2);
    margin-top: 2px;
  }

  .entry-amount {
    font-family: ui-monospace, 'Cascadia Code', 'Menlo', 'Consolas', monospace;
    font-size: 16px;
    font-weight: 700;
    margin-left: 12px;
    flex-shrink: 0;
  }

  .entry-running {
    font-family: ui-monospace, 'Cascadia Code', 'Menlo', 'Consolas', monospace;
    font-size: 11px;
    color: var(--text2);
    margin-left: 12px;
    flex-shrink: 0;
    text-align: right;
  }

  .entry-delete {
    position: absolute;
    right: -6px;
    top: -6px;
    width: 22px;
    height: 22px;
    background: var(--red);
    border: 2px solid var(--bg);
    border-radius: 50%;
    color: #fff;
    font-size: 12px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }

  .entry:hover .entry-delete,
  .entry:active .entry-delete {
    display: flex;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text2);
  }

  .empty-state .icon {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.3;
  }

  /* ── Input area ── */
  .input-area {
    flex-shrink: 0;
    padding: 12px 20px;
    padding-bottom: calc(12px + var(--safe-bottom));
    background: var(--surface);
    border-top: 1px solid var(--border);
  }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }

  .input-amount {
    font-family: ui-monospace, 'Cascadia Code', 'Menlo', 'Consolas', monospace;
    font-size: 20px;
    font-weight: 700;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    padding: 12px 14px;
    width: 130px;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }

  .input-amount::-webkit-inner-spin-button,
  .input-amount::-webkit-outer-spin-button {
    -webkit-appearance: none;
  }

  .input-amount:focus {
    border-color: var(--accent);
  }

  .input-comment {
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    font-size: 15px;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    padding: 12px 14px;
    flex: 1;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-comment:focus {
    border-color: var(--accent);
  }

  .btn-add {
    width: 100%;
    padding: 16px;
    font-family: ui-monospace, 'Cascadia Code', 'Menlo', 'Consolas', monospace;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.1s;
  }

  .btn-add:active {
    transform: scale(0.97);
    opacity: 0.85;
  }

  .btn-add:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none;
  }

  /* ── Menu ── */
  .menu-btn {
    background: none;
    border: none;
    color: var(--text2);
    font-size: 22px;
    cursor: pointer;
    padding: 4px;
  }

  .menu-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    backdrop-filter: blur(4px);
  }

  .menu-overlay.open { display: block; }

  .menu-panel {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px;
    padding-bottom: calc(24px + var(--safe-bottom));
    z-index: 101;
  }

  .menu-panel h3 {
    font-family: ui-monospace, 'Cascadia Code', 'Menlo', 'Consolas', monospace;
    font-size: 14px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 16px;
  }

  .menu-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    color: var(--text);
    font-size: 15px;
    font-weight: 500;
    background: none;
    border-left: none;
    border-right: none;
    border-top: none;
    width: 100%;
    text-align: left;
  }

  .menu-item:last-child { border-bottom: none; }

  .menu-item .mi-icon {
    font-size: 20px;
    width: 28px;
    text-align: center;
  }

  .menu-close {
    margin-top: 12px;
    width: 100%;
    padding: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text2);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #000;
    font-family: ui-monospace, 'Cascadia Code', 'Menlo', 'Consolas', monospace;
    font-size: 13px;
    font-weight: 700;
    padding: 10px 20px;
    border-radius: 10px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 200;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── Animations ── */
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .entry { animation: slideUp 0.25s ease-out; }

  /* scrollbar */
  .list-container::-webkit-scrollbar { width: 4px; }
  .list-container::-webkit-scrollbar-track { background: transparent; }
  .list-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  ::placeholder { color: #555; }

  /* ── Category dropdown ── */
  .input-category {
    font-family: ui-monospace, 'Cascadia Code', 'Menlo', 'Consolas', monospace;
    font-size: 14px;
    font-weight: 600;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    padding: 12px 10px;
    width: 95px;
    flex-shrink: 0;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    appearance: none;
    text-align: center;
  }

  .input-category:focus {
    border-color: var(--accent);
  }

  /* ── Date button ── */
  .date-btn-wrap {
    position: relative;
    display: flex;
    margin-left: auto;
  }

  .date-btn-wrap input[type="date"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    width: 100%;
    height: 100%;
    color-scheme: dark;
  }

  .input-date-btn {
    font-family: ui-monospace, 'Cascadia Code', 'Menlo', 'Consolas', monospace;
    font-size: 13px;
    font-weight: 600;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    padding: 0 12px;
    min-width: 68px;
    flex: 1;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    white-space: nowrap;
  }

  .input-date-btn.is-custom {
    border-color: var(--accent-dim);
    color: var(--accent);
  }

  /* ── Budget bar ── */
  .budget-bar-row {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-top: 3px;
  }

  .budget-bar-line {
    flex: 1;
    height: 2px;
    border-radius: 1px;
    background: var(--border);
  }

  .budget-delta {
    font-family: ui-monospace, 'Cascadia Code', 'Menlo', 'Consolas', monospace;
    font-size: 11px;
    font-weight: 700;
    white-space: nowrap;
  }

  /* ── Drawer toggle ── */
  .drawer-toggle {
    background: none;
    border: none;
    color: var(--text2);
    font-size: 13px;
    cursor: pointer;
    padding: 0 0 0 4px;
    line-height: 1;
    flex-shrink: 0;
    opacity: 0.6;
  }

  .drawer-toggle:active { opacity: 1; }

  /* ── Category summary ── */
  .cat-black-amount {
    font-family: ui-monospace, 'Cascadia Code', 'Menlo', 'Consolas', monospace;
    font-size: 38px;
    font-weight: 700;
    letter-spacing: -1.5px;
    line-height: 1;
    color: var(--text);
  }

  .cat-black-label {
    font-size: 11px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 3px;
  }

  .cat-others {
    margin-top: 10px;
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }

  .cat-total-item {
    margin-left: auto;
    text-align: right;
  }

  .cat-total-val {
    font-family: ui-monospace, 'Cascadia Code', 'Menlo', 'Consolas', monospace;
    font-size: 15px;
    font-weight: 600;
    color: var(--text2);
  }

  .cat-other-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .cat-other-name {
    font-size: 10px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .cat-other-val {
    font-family: ui-monospace, 'Cascadia Code', 'Menlo', 'Consolas', monospace;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  /* ── Entry category badge ── */
  .entry-cat {
    font-family: ui-monospace, 'Cascadia Code', 'Menlo', 'Consolas', monospace;
    font-size: 10px;
    color: var(--text2);
    background: var(--surface2);
    padding: 1px 5px;
    border-radius: 4px;
    margin-left: 6px;
  }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div style="display:flex;align-items:center;gap:12px;">
      <span class="logo">spent.</span>
      <div class="month-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <span class="month-label" id="monthLabel"></span>
        <button onclick="changeMonth(1)">›</button>
      </div>
    </div>
    <button class="menu-btn" onclick="toggleMenu()">⋯</button>
  </div>

  <!-- Summary -->
  <div class="summary">
    <div class="cat-black-amount" id="catBlack">$0</div>
    <div class="budget-bar-row">
      <span class="cat-black-label">Black</span>
      <div class="budget-bar-line" id="budgetBarLine"></div>
      <span class="budget-delta" id="budgetDelta"></span>
      <button class="drawer-toggle" id="drawerToggle" onclick="toggleDrawer()">▾</button>
    </div>
    <div class="cat-others" id="catOthers">
      <div class="cat-other-item">
        <div class="cat-other-name">Mid</div>
        <div class="cat-other-val" id="catMid">$0</div>
      </div>
      <div class="cat-other-item">
        <div class="cat-other-name">Small</div>
        <div class="cat-other-val" id="catSmall">$0</div>
      </div>
      <div class="cat-other-item">
        <div class="cat-other-name">CCTE</div>
        <div class="cat-other-val" id="catCCTE">$0</div>
      </div>
      <div class="cat-other-item cat-total-item">
        <div class="cat-other-name">Total</div>
        <div class="cat-total-val" id="totalAmount">$0</div>
      </div>
    </div>
  </div>

  <!-- List -->
  <div class="list-container" id="listContainer"></div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row" style="margin-bottom:8px">
      <input type="number" class="input-amount" id="amountInput" placeholder="0.00" inputmode="decimal" step="0.01">
      <select class="input-category" id="categoryInput">
        <option value="Black">Black</option>
        <option value="Mid">Mid</option>
        <option value="Small">Small</option>
        <option value="CCTE">CCTE</option>
      </select>
      <div class="date-btn-wrap">
        <input type="date" id="datePickerInput" onchange="onDateChange()">
        <button class="input-date-btn" id="dateBtnDisplay" onclick="openDatePicker()">Today</button>
      </div>
    </div>
    <div class="input-row">
      <input type="text" class="input-comment" id="commentInput" placeholder="What was it for?" maxlength="100">
    </div>
    <button class="btn-add" id="addBtn" onclick="addEntry()" disabled>+ Add Expense</button>
  </div>
</div>

<!-- Menu overlay -->
<div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()">
  <div class="menu-panel" onclick="event.stopPropagation()">
    <h3>Options</h3>
    <button class="menu-item" onclick="exportCSV()">
      <span class="mi-icon">📄</span> Export CSV
    </button>
    <button class="menu-item" onclick="emailCSV()">
      <span class="mi-icon">✉️</span> Send via Email
    </button>
    <button class="menu-item" onclick="setBudget()">
      <span class="mi-icon">🎯</span> Set Black Budget
    </button>
    <button class="menu-item" onclick="clearMonth()">
      <span class="mi-icon">🗑️</span> Clear this month
    </button>
    <button class="menu-close" onclick="toggleMenu()">Close</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── State ──
const STORAGE_KEY = 'spent_entries';
const BUDGET_KEY  = 'spent_black_budget';
let viewYear, viewMonth; // 0-indexed month

function now() { return new Date(); }

function initMonth() {
  const d = now();
  viewYear = d.getFullYear();
  viewMonth = d.getMonth();
}

// ── Storage ──
function loadAll() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  } catch { return []; }
}

function saveAll(entries) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}

// ── Filtering ──
function getMonthEntries() {
  return loadAll().filter(e => {
    const d = new Date(e.ts);
    return d.getFullYear() === viewYear && d.getMonth() === viewMonth;
  }).sort((a, b) => b.ts - a.ts);
}

// ── Rendering ──
function render() {
  // Month label
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('monthLabel').textContent = `${monthNames[viewMonth]} ${viewYear}`;

  const entries = getMonthEntries();
  const total = entries.reduce((s, e) => s + e.amount, 0);
  document.getElementById('totalAmount').textContent = formatMoney(total);

  const catTotals = { Black: 0, Mid: 0, Small: 0, CCTE: 0 };
  entries.forEach(e => { catTotals[e.category || 'Black'] += e.amount; });
  document.getElementById('catBlack').textContent = formatMoney(catTotals.Black);
  document.getElementById('catMid').textContent = formatMoney(catTotals.Mid);
  document.getElementById('catSmall').textContent = formatMoney(catTotals.Small);
  document.getElementById('catCCTE').textContent = formatMoney(catTotals.CCTE);
  updateBudgetBadge(catTotals.Black);

  const container = document.getElementById('listContainer');

  if (entries.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">○</div>
        <div>No expenses yet</div>
      </div>`;
    return;
  }

  // Group by day
  const groups = {};
  entries.forEach(e => {
    const d = new Date(e.ts);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(e);
  });

  // Running sum (chronological — oldest first)
  const chronological = [...entries].reverse();
  let running = 0;
  const runningMap = {};
  chronological.forEach(e => {
    running += e.amount;
    runningMap[e.ts] = running;
  });

  let html = '';
  const sortedDays = Object.keys(groups).sort().reverse();

  sortedDays.forEach(day => {
    const d = new Date(day + 'T12:00:00');
    const dayLabel = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    const dayTotal = groups[day].reduce((s, e) => s + e.amount, 0);

    html += `<div class="day-group">`;
    html += `<div class="day-header"><span>${dayLabel}</span><span>${formatMoney(dayTotal)}</span></div>`;

    groups[day].forEach(e => {
      const t = new Date(e.ts);
      const time = t.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      html += `
        <div class="entry">
          <button class="entry-delete" onclick="deleteEntry(${e.ts})" title="Delete">✕</button>
          <div class="entry-left">
            <div class="entry-comment">${escapeHtml(e.comment || '—')}</div>
            <div class="entry-time">${time}<span class="entry-cat">${escapeHtml(e.category || 'Black')}</span></div>
          </div>
          <div style="text-align:right">
            <div class="entry-amount">${formatMoney(e.amount)}</div>
            <div class="entry-running">Σ ${formatMoney(runningMap[e.ts])}</div>
          </div>
        </div>`;
    });

    html += `</div>`;
  });

  container.innerHTML = html;
}

function formatMoney(n) {
  return '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function shortAmount(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
  if (n >= 1000)    return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
  return Math.round(n).toString();
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// ── Date helpers ──
function getTodayString() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function openDatePicker() {
  const input = document.getElementById('datePickerInput');
  try { input.showPicker(); } catch(e) { input.focus(); }
}

function onDateChange() {
  const val = document.getElementById('datePickerInput').value;
  const btn = document.getElementById('dateBtnDisplay');
  if (!val || val === getTodayString()) {
    btn.textContent = 'Today';
    btn.classList.remove('is-custom');
  } else {
    const d = new Date(val + 'T12:00:00');
    btn.textContent = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    btn.classList.add('is-custom');
  }
}

// ── Actions ──
function addEntry() {
  const amountEl = document.getElementById('amountInput');
  const commentEl = document.getElementById('commentInput');
  const categoryEl = document.getElementById('categoryInput');
  const amount = parseFloat(amountEl.value);
  if (!amount || amount <= 0) return;

  const dateVal = document.getElementById('datePickerInput').value;
  let ts;
  if (!dateVal || dateVal === getTodayString()) {
    ts = Date.now();
  } else {
    const t = new Date();
    const [y, mo, da] = dateVal.split('-').map(Number);
    ts = new Date(y, mo - 1, da, t.getHours(), t.getMinutes(), t.getSeconds()).getTime();
  }

  const entries = loadAll();
  entries.push({
    amount: Math.round(amount * 100) / 100,
    comment: commentEl.value.trim(),
    category: categoryEl.value,
    ts
  });
  saveAll(entries);

  amountEl.value = '';
  commentEl.value = '';
  document.getElementById('addBtn').disabled = true;

  // Reset date to today
  document.getElementById('datePickerInput').value = getTodayString();
  onDateChange();

  // Jump to the month of the added entry
  const entryDate = new Date(ts);
  viewYear = entryDate.getFullYear();
  viewMonth = entryDate.getMonth();

  render();
  toast('Added!');
  document.getElementById('listContainer').scrollTop = 0;
}

function deleteEntry(ts) {
  if (!confirm('Delete this entry?')) return;
  const entries = loadAll().filter(e => e.ts !== ts);
  saveAll(entries);
  render();
  toast('Deleted');
}

function changeMonth(dir) {
  viewMonth += dir;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  render();
}

// ── Export ──
function generateCSV() {
  const entries = getMonthEntries().reverse(); // chronological
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  let csv = 'Date,Time,Amount,Category,Comment,Running Total\n';
  let running = 0;
  entries.forEach(e => {
    const d = new Date(e.ts);
    running += e.amount;
    const date = d.toLocaleDateString('en-US');
    const time = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    const category = e.category || 'Black';
    const comment = '"' + (e.comment || '').replace(/"/g, '""') + '"';
    csv += `${date},${time},${e.amount.toFixed(2)},${category},${comment},${running.toFixed(2)}\n`;
  });
  return { csv, filename: `spent_${monthNames[viewMonth]}_${viewYear}.csv` };
}

function exportCSV() {
  const { csv, filename } = generateCSV();
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
  toggleMenu();
  toast('CSV downloaded');
}

function emailCSV() {
  const { csv, filename } = generateCSV();
  const entries = getMonthEntries();
  const total = entries.reduce((s, e) => s + e.amount, 0);
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const subject = encodeURIComponent(`Spent — ${monthNames[viewMonth]} ${viewYear}: ${formatMoney(total)}`);
  const body = encodeURIComponent(`${monthNames[viewMonth]} ${viewYear} expenses: ${formatMoney(total)}\n${entries.length} entries\n\n` + csv);
  window.location.href = `mailto:?subject=${subject}&body=${body}`;
  toggleMenu();
}

function clearMonth() {
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  if (!confirm(`Delete all entries for ${monthNames[viewMonth]} ${viewYear}?`)) return;
  const entries = loadAll().filter(e => {
    const d = new Date(e.ts);
    return !(d.getFullYear() === viewYear && d.getMonth() === viewMonth);
  });
  saveAll(entries);
  render();
  toggleMenu();
  toast('Month cleared');
}

// ── Budget ──
function updateBudgetBadge(blackSpend) {
  const line = document.getElementById('budgetBarLine');
  const deltaEl = document.getElementById('budgetDelta');
  const budgetStr = localStorage.getItem(BUDGET_KEY);
  if (!budgetStr) {
    line.style.background = 'var(--border)';
    deltaEl.textContent = '';
    return;
  }

  const budget = parseFloat(budgetStr);
  const today = new Date();
  const isCurrentMonth = viewYear === today.getFullYear() && viewMonth === today.getMonth();

  let expected;
  if (isCurrentMonth) {
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
    expected = (budget / daysInMonth) * today.getDate();
  } else {
    expected = budget;
  }

  const delta = blackSpend - expected; // + = over, - = under
  const ratio = expected > 0 ? blackSpend / expected : 0;

  // HSL: 0=red, 60=yellow, 120=green
  // under (ratio 0→1): green→yellow; over (ratio 1→1.2): yellow→red
  let hue;
  if (ratio <= 1) {
    hue = 60 + (1 - ratio) * 60;
  } else {
    hue = Math.max(0, 60 - (ratio - 1) * 300);
  }
  const color = `hsl(${Math.round(hue)}, 75%, 48%)`;

  line.style.background = color;
  const absStr = shortAmount(Math.abs(delta));
  deltaEl.textContent = delta > 0 ? `+${absStr}` : `−${absStr}`;
  deltaEl.style.color = color;
}

// ── Drawer ──
function toggleDrawer() {
  const el = document.getElementById('catOthers');
  const btn = document.getElementById('drawerToggle');
  const hidden = el.style.display === 'none';
  el.style.display = hidden ? '' : 'none';
  btn.textContent = hidden ? '▾' : '▴';
}

function setBudget() {
  const current = localStorage.getItem(BUDGET_KEY) || '';
  const val = prompt('Monthly Black card budget ($):\n(Leave empty to clear)', current);
  if (val === null) { toggleMenu(); return; }
  const num = parseFloat(val);
  if (!isNaN(num) && num > 0) {
    localStorage.setItem(BUDGET_KEY, num.toFixed(2));
    toast('Budget set!');
  } else if (val.trim() === '') {
    localStorage.removeItem(BUDGET_KEY);
    toast('Budget cleared');
  }
  toggleMenu();
  render();
}

// ── Menu ──
function toggleMenu() {
  document.getElementById('menuOverlay').classList.toggle('open');
}

// ── Toast ──
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1500);
}

// ── Input validation ──
document.getElementById('amountInput').addEventListener('input', function() {
  document.getElementById('addBtn').disabled = !this.value || parseFloat(this.value) <= 0;
});

// Enter key to add
document.getElementById('commentInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') addEntry();
});
document.getElementById('amountInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('commentInput').focus();
});

// ── Init ──
initMonth();
document.getElementById('datePickerInput').value = getTodayString();
render();

// ── Service Worker Registration ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
